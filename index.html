<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Curso de Contabilidade Professor Moreira - Aula com Mesa Wacom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#07172f;color:#111827}
body{touch-action:none}
.app{width:100vw;height:100vh;display:flex;flex-direction:column;padding:10px;background:linear-gradient(135deg,#0f172a,#082f6f)}
.header{height:50px;background:linear-gradient(90deg,#07172f,#0b2f6b);border:2px solid #facc15;border-radius:14px;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 18px;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.header h1{font-size:18px;font-weight:900;letter-spacing:.2px}
.header .zap{font-size:13px;color:#fde68a;font-weight:900}
.main{flex:1;min-height:0;display:grid;grid-template-columns:52% 48%;gap:10px;margin-top:10px}
.panel{border-radius:18px;overflow:hidden;box-shadow:0 12px 28px rgba(0,0,0,.28)}
.questionPanel{background:#fff7ed;border:4px solid #f59e0b;display:flex;flex-direction:column;min-height:0}
.questionTop{height:40px;background:#0b2f6b;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-weight:900}
.badge{background:#facc15;color:#111827;padding:4px 10px;font-size:14px;border-radius:999px;font-weight:900}
.questionCanvasWrap{position:relative;flex:1;min-height:0;background:#fff7ed}
.content{position:absolute;inset:0;padding:10px 12px;overflow:auto;font-size:15px;line-height:1.24;color:#000;background:#fff7ed}
.statement{font-size:15.5px;font-weight:800;margin-bottom:9px}
.alt{background:white;border:2px solid #e5e7eb;border-radius:9px;padding:5px 8px;margin:4px 0;font-size:14.2px;font-weight:800;color:#000}
#questionCanvas{position:absolute;inset:0;width:100%;height:100%;background:transparent;z-index:10;touch-action:none;cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 28 28"><path d="M4 24 L8 16 L20 4 L24 8 L12 20 Z" fill="%230b2f6b" stroke="black" stroke-width="1"/><circle cx="6" cy="22" r="2" fill="black"/></svg>') 3 24, crosshair}
.controls{min-height:44px;height:auto;background:#f8fafc;border-top:2px solid #e5e7eb;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;padding:8px}
button{border:0;border-radius:10px;padding:7px 10px;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 11px rgba(0,0,0,.16);white-space:nowrap}
.navBtn{background:#0b2f6b;color:white}.resetBtn{background:#dc2626;color:white}.clearQ{background:#92400e;color:#fff}
.wacom{background:#dbeafe;border:4px solid #0b2f6b;display:flex;flex-direction:column;min-height:0}
.wacomHeader{height:38px;background:linear-gradient(90deg,#111827,#374151);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-weight:900}
.toolbar{min-height:46px;background:#f8fafc;border-bottom:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;padding:5px}
.tool.black{background:#111827;color:white}.tool.blue{background:#0a3d91;color:white}.tool.red{background:#dc2626;color:white}.tool.yellow{background:#facc15;color:#111827}.tool.eraser{background:#e5e7eb;color:#111827;border:1px solid #9ca3af}.tool.line{background:#0f766e;color:white}.tool.clear{background:#7c2d12;color:white}
.boardWrap{flex:1;min-height:0;margin:8px;background:#fff;border:3px solid #111827;border-radius:10px;position:relative;overflow:hidden}
#board{width:100%;height:100%;display:block;background:#fff;touch-action:none;cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 28 28"><path d="M4 24 L8 16 L20 4 L24 8 L12 20 Z" fill="%230b2f6b" stroke="black" stroke-width="1"/><circle cx="6" cy="22" r="2" fill="black"/></svg>') 3 24, crosshair}
.activeTool{outline:3px solid #facc15;transform:translateY(-1px)}
.footer{height:26px;color:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
@media (max-width:900px){body{overflow:auto;touch-action:auto}.app{height:auto;min-height:100vh}.main{grid-template-columns:1fr}.questionPanel,.wacom{min-height:560px}.header{height:auto;min-height:52px;gap:8px;flex-direction:column;padding:8px}.header h1{font-size:17px}.content{font-size:15px}}
@media print{.wacom,.controls,.footer{display:none}.app{background:white;padding:0}.main{display:block}.questionPanel{border:0;box-shadow:none}.header{color:#000;background:white;border:0}}

/* Ajuste para caber melhor a questão completa no lado esquerdo */
.content,.statement,.alt{letter-spacing:-.15px}
.tool{padding:5px 6px;font-size:11.5px}
.questionCanvasWrap{min-height:0}
</style>
</head>
<body>
<div class="app">
  <header class="header"><h1>Curso de Contabilidade Professor Moreira</h1><div class="zap">WhatsApp: (61) 98532-3574</div></header>
  <main class="main">
    <section class="panel questionPanel">
      <div class="questionTop"><div class="badge" id="questionBadge">Questão 1</div><div id="progressText">1 / 1</div></div>
      <div class="questionCanvasWrap" id="questionWrap">
        <div class="content" id="questionContent"><div class="statement" id="statement"></div><div id="alternatives"></div></div>
        <canvas id="questionCanvas"></canvas>
      </div>
      <div class="controls"><button class="navBtn" onclick="prevQuestion()">⬅ Voltar</button><button class="navBtn" onclick="nextQuestion()">Avançar ➡</button><button class="clearQ" onclick="clearQuestionNotes()">Limpar Anotações da Questão</button><button class="resetBtn" onclick="restart()">Reiniciar</button></div>
    </section>
    <section class="panel wacom">
      <div class="wacomHeader"><div>Mesa Wacom</div><div>Lousa branca suave</div></div>
      <div class="toolbar">
        <button class="tool black activeTool" data-tool="black" onclick="setPen('#111827',3.2,'black')">Preta fina</button>
        <button class="tool blue" data-tool="blue" onclick="setPen('#0a3d91',3.2,'blue')">Azul fina</button>
        <button class="tool red" data-tool="red" onclick="setPen('#dc2626',3.2,'red')">Vermelha fina</button>
        <button class="tool yellow" data-tool="marker" onclick="setMarker()">Marca-texto</button>
        <button class="tool eraser" data-tool="eraser" onclick="setEraser()">Borracha</button>
        <button class="tool line" data-tool="lineH" onclick="setLineMode('horizontal')">Linha Horizontal</button>
        <button class="tool line" data-tool="lineV" onclick="setLineMode('vertical')">Linha Vertical</button>
        <button class="tool clear" onclick="clearBoard()">Limpar lousa</button>
      </div>
      <div class="boardWrap"><canvas id="board"></canvas></div>
    </section>
  </main>
  <div class="footer">Professor Moreira • Aula ao vivo com mesa digitalizadora Wacom</div>
</div>
<script>
const questions = [{"q": "A Indústria de Calçados Couro Fino Ltda., em determinado período, iniciou a produção de um novo lote de botas. Para tanto, consumiu R$ 50.000$ em matéria-prima, aplicou R$ 30.000$ em Mão de Obra Direta (MOD) e alocou R$ 20.000$ em Custos Indiretos de Fabricação (CIF). No mesmo período, a empresa incorreu em R$ 15.000$ com comissões de vendedores e fretes de entrega. Foram integralmente produzidas 2.000 unidades, das quais 1.500 foram vendidas. Com base exclusivamente nessas informações, assinale a opção que apresenta, respectivamente, o Custo Total da Produção do período e o Custo Unitário do produto.", "alts": ["A) R$ 115.000$ e R$ 57,50$", "B) R$ 100.000$ e R$ 50,00$", "C) R$ 100.000$ e R$ 66,67$", "D) R$ 75.000$ e R$ 50,00$"]}, {"q": "A Cia. Metalúrgica Força Pura fabrica componentes automotivos. Em abril, a empresa apresentou os seguintes gastos: matéria-prima de R$ 120.000$, MOD de R$ 80.000$ e CIF de R$ 40.000$. O departamento administrativo central consumiu R$ 25.000$ com materiais de escritório e honorários da diretoria. O relatório do estoque indicou que foram finalizadas 5.000 peças no mês e 4.200 foram comercializadas. Diante do exposto, o Custo Total de Produção e o Custo Unitário do componente são, respectivamente:", "alts": ["A) R$ 240.000$ e R$ 48,00$", "B) R$ 265.000$ e R$ 53,00$", "C) R$ 240.000$ e R$ 57,14$", "D) R$ 201.600$ e R$ 48,00$"]}, {"q": "A Doceria Delícia Caseira S.A. produz ovos de Páscoa artesanais. Para o lote de abril, os registros apontaram R$ 15.000$ em chocolate e embalagens (matéria-prima), R$ 10.000$ em salários dos confeiteiros (MOD) e R$ 5.000$ de depreciação e energia da fábrica (CIF). Adicionalmente, a empresa gastou R$ 8.000$ com publicidade e propaganda nas redes sociais para divulgar a marca. Sabendo que a empresa produziu 1.000 ovos e vendeu 800 unidades, assinale a alternativa correta para o Custo Total e Custo Unitário de produção.", "alts": ["A) R$ 38.000$ e R$ 38,00$", "B) R$ 30.000$ e R$ 37,50$", "C) R$ 24.000$ e R$ 30,00$", "D) R$ 30.000$ e R$ 30,00$"]}, {"q": "Determinada Indústria Têxtil Fio de Ouro Ltda. incorreu em R$ 90.000$ de matéria-prima consumida, R$ 45.000$ de mão de obra direta e R$ 15.000$ de custos indiretos. Simultaneamente, registrou R$ 12.000$ referentes a juros e encargos sobre empréstimos bancários (despesas financeiras). Ao final do mês, o relatório técnico indicou 3.000 camisas produzidas e 1.200 camisas estocadas no almoxarifado de produtos acabados. Assinale a opção que indica o Custo Total e o Custo Unitário das camisas, respectivamente.", "alts": ["A) R$ 150.000$ e R$ 83,33$", "B) R$ 162.000$ e R$ 54,00$", "C) R$ 150.000$ e R$ 50,00$", "D) R$ 90.000$ e R$ 50,00$"]}, {"q": "A fábrica de móveis Estilo Real S.A. processou um lote de mesas de jantar e registrou os seguintes dados: Matéria-prima: R$ 200.000$; MOD: R$ 100.000$; CIF: R$ 60.000$. Paralelamente, incorreu em R$ 18.000$ com o aluguel do showroom de vendas e R$ 7.000$ com material de consumo da administração geral. Foram concluídas 400 mesas, e a equipe comercial vendeu 350 delas. O Custo Total da Produção e o Custo Unitário de cada mesa totalizam, respectivamente:", "alts": ["A) R$ 360.000$ e R$ 1.028,57$", "B) R$ 315.000$ e R$ 900,00$", "C) R$ 385.000$ e R$ 962,50$", "D) R$ 360.000$ e R$ 900,00$"]}, {"q": "A Indústria Química Reação Certa Ltda. informou que em maio gastou R$ 350.000$ com insumos químicos básicos, R$ 150.000$ com salários do pessoal do laboratório e operação da fábrica e R$ 100.000$ com despesas de depreciação de maquinários industriais. Fora da fábrica, o departamento de Recursos Humanos corporativo teve despesas com pessoal de R$ 30.000$. O volume de produção finalizado foi de 10.000 galões, sendo que 9.000 galões foram vendidos. Indique os valores corretos de Custo Total de Produção e Custo Unitário.", "alts": ["A) R$ 600.000$ e R$ 60,00$", "B) R$ 630.000$ e R$ 63,00$", "C) R$ 600.000$ e R$ 66,67$", "D) R$ 540.000$ e R$ 60,00$"]}, {"q": "A empresa de Brinquedos Alegria S.A. gastou no trimestre R$ 80.000$ com matérias-primas plásticas, R$ 40.000$ com mão de obra de montagem e R$ 30.000$ com aluguel e seguros do galpão fabril. No encerramento das demonstrações, registrou também R$ 14.000$ relativos a honorários advocatícios judiciais da assessoria jurídica da sede. Foram produzidas 5.000 unidades de um carrinho eletrônico e 3.500 unidades foram vendidas. Determine o Custo Total de Produção e o Custo Unitário do carrinho.", "alts": ["A) R$ 164.000$ e R$ 32,80$", "B) R$ 150.000$ e R$ 30,00$", "C) R$ 150.000$ e R$ 42,86$", "D) R$ 105.000$ e R$ 30,00$"]}, {"q": "Uma editora e gráfica rápida, a Impressão Digital S.A., produziu um lote especial de apostilas para concursos. Gastou R$ 14.000$ em papel e tintas, R$ 8.000$ com os operadores de prensas e R$ 3.000$ com energia e manutenção da gráfica (CIF). Paralelamente, o setor de marketing despendeu R$ 6.000$ em campanhas promocionais. Foram impressas 500 apostilas e restaram 100 unidades no estoque final de produtos acabados. O Custo Total de Produção e o Custo Unitário das apostilas são, respectivamente:", "alts": ["A) R$ 31.000$ e R$ 62,00$", "B) R$ 25.000$ e R$ 62,50$", "C) R$ 25.000$ e R$ 50,00$", "D) R$ 20.000$ e R$ 50,00$"]}, {"q": "A Indústria de Alimentos Conservas do Vale S.A. produziu um lote de geleias de morango com os seguintes gastos: Matéria-prima de R$ 42.000$; MOD de R$ 18.000$; CIF de R$ 10.000$. Foram identificados, no mesmo período, R$ 5.000$ de despesas com depreciação dos computadores da sede administrativa e despesas com o telefone comercial. No total, foram envasados 10.000 potes de geleia e a comercialização atingiu 8.500 potes. Diante disso, o Custo Total de Produção e o Custo Unitário são, respectivamente:", "alts": ["A) R$ 70.000$ e R$ 8,24$", "B) R$ 75.000$ e R$ 7,50$", "C) R$ 59.500$ e R$ 7,00$", "D) R$ 70.000$ e R$ 7,00$"]}, {"q": "A Metalúrgica Soluções de Aço Ltda. fabricou vigas sob medida para construção civil. Registrou os seguintes gastos no mês de junho: chapas de aço e insumos básicos por R$ 60.000$, salários e encargos diretos da fábrica por R$ 30.000$, e custos industriais indiretos por R$ 15.000$. Adicionalmente, computou R$ 9.000$ de tributos sobre o lucro e despesas com o faturamento do escritório comercial. Foram produzidas 150 vigas e vendidas 120 delas. O Custo Total da Produção e o Custo Unitário de cada viga equivalem a:", "alts": ["A) R$ 105.000$ e R$ 700,00$", "B) R$ 114.000$ e R$ 760,00$", "C) R$ 105.000$ e R$ 875,00$", "D) R$ 84.000$ e R$ 700,00$"]}];
let current = 0;
function renderQuestion(){
  const item = questions[current];
  document.getElementById('questionBadge').textContent = 'Questão ' + (current + 1);
  document.getElementById('progressText').textContent = (current + 1) + ' / ' + questions.length;
  document.getElementById('statement').textContent = item.q;
  document.getElementById('alternatives').innerHTML = item.alts.map(a => '<div class="alt">' + escapeHtml(a) + '</div>').join('');
  setTimeout(() => { resizeCanvas(qCanvas, qCtx, true); clearQuestionNotes(); }, 60);
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function nextQuestion(){ if(current < questions.length - 1){ current++; renderQuestion(); clearBoard(); } }
function prevQuestion(){ if(current > 0){ current--; renderQuestion(); clearBoard(); } }
function restart(){ current = 0; renderQuestion(); clearBoard(); clearQuestionNotes(); }
const board = document.getElementById('board');
const ctx = board.getContext('2d', {alpha:false});
const qCanvas = document.getElementById('questionCanvas');
const qCtx = qCanvas.getContext('2d', {alpha:true});

let penColor = '#111827';
let penSize = 3.2;
let composite = 'source-over';
let mode = 'pen';
let activeCanvas = null;
let activeCtx = null;
let drawing = false;
let lastPoint = null;
let lineStart = null;

function resizeCanvas(canvas, context, transparent=false){
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const old = document.createElement('canvas');
  old.width = canvas.width;
  old.height = canvas.height;
  if(old.width && old.height) old.getContext('2d').drawImage(canvas,0,0);

  canvas.width = Math.max(1, Math.floor(rect.width*dpr));
  canvas.height = Math.max(1, Math.floor(rect.height*dpr));
  context.setTransform(dpr,0,0,dpr,0,0);

  if(!transparent){
    context.fillStyle='#fff';
    context.fillRect(0,0,rect.width,rect.height);
  } else {
    context.clearRect(0,0,rect.width,rect.height);
  }

  if(old.width && old.height){
    context.drawImage(old,0,0,old.width,old.height,0,0,rect.width,rect.height);
  }
  context.lineCap='round';
  context.lineJoin='round';
  context.miterLimit = 1;
  context.imageSmoothingEnabled=true;
  context.imageSmoothingQuality='high';
}
function resizeAll(){ resizeCanvas(board,ctx,false); resizeCanvas(qCanvas,qCtx,true); }
window.addEventListener('resize', resizeAll);
setTimeout(resizeAll,100);

function pos(e, canvas){
  const r=canvas.getBoundingClientRect();
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}
function getEventPoints(e, canvas){
  const events = typeof e.getCoalescedEvents === 'function' ? e.getCoalescedEvents() : [e];
  return events.map(ev => pos(ev, canvas));
}
function applyStyle(context){
  context.globalCompositeOperation=composite;
  context.strokeStyle=penColor;
  context.fillStyle=penColor;
  context.lineWidth=penSize;
  context.lineCap='round';
  context.lineJoin='round';
}
function drawSoftDot(context,p){
  applyStyle(context);
  context.beginPath();
  context.arc(p.x,p.y,Math.max(1.25,penSize/2),0,Math.PI*2);
  context.fill();
}
function drawSoftSegment(context, from, to){
  applyStyle(context);
  const dx = to.x - from.x;
  const dy = to.y - from.y;
  const dist = Math.hypot(dx,dy);
  if(dist < 0.01){ drawSoftDot(context,to); return; }

  // Interpolação bem curta: preenche os espaços entre pontos capturados pela Wacom/navegador.
  const maxStep = Math.max(0.45, penSize * 0.22);
  const steps = Math.max(1, Math.ceil(dist / maxStep));
  let prev = from;
  for(let i=1;i<=steps;i++){
    const p = {x: from.x + dx*i/steps, y: from.y + dy*i/steps};
    const mid = {x:(prev.x+p.x)/2, y:(prev.y+p.y)/2};
    context.beginPath();
    context.moveTo(prev.x, prev.y);
    context.quadraticCurveTo(prev.x, prev.y, mid.x, mid.y);
    context.lineTo(p.x, p.y);
    context.stroke();
    prev = p;
  }
}
function begin(e, canvas, context){
  e.preventDefault();
  canvas.setPointerCapture?.(e.pointerId);
  activeCanvas=canvas;
  activeCtx=context;
  drawing=true;
  const p=pos(e, canvas);
  if(mode==='lineH'||mode==='lineV'){
    lineStart=p;
    return;
  }
  lastPoint=p;
  drawSoftDot(context,p);
}
function move(e){
  if(!drawing || !activeCanvas || !activeCtx) return;
  e.preventDefault();
  if(mode==='lineH'||mode==='lineV') return;
  const pts = getEventPoints(e, activeCanvas);
  for(const p of pts){
    if(lastPoint) drawSoftSegment(activeCtx, lastPoint, p);
    lastPoint = p;
  }
}
function end(e){
  if(!drawing || !activeCtx || !activeCanvas) return;
  e.preventDefault();
  if((mode==='lineH'||mode==='lineV') && lineStart){
    const p=pos(e, activeCanvas);
    line(activeCtx,lineStart,p);
  }
  drawing=false;
  lastPoint=null;
  lineStart=null;
  activeCanvas=null;
  activeCtx=null;
}
function line(context,a,b){
  const oldComposite = composite;
  composite='source-over';
  applyStyle(context);
  context.lineWidth=Math.max(2.5, penSize);
  context.beginPath();
  if(mode==='lineH'){
    context.moveTo(a.x,a.y);
    context.lineTo(b.x,a.y);
  } else {
    context.moveTo(a.x,a.y);
    context.lineTo(a.x,b.y);
  }
  context.stroke();
  composite=oldComposite;
  mode='pen';
  setActive('black');
}
[board,qCanvas].forEach(c=>{
  c.addEventListener('pointerdown', e=>begin(e,c,c===board?ctx:qCtx));
  c.addEventListener('pointermove', move);
  c.addEventListener('pointerrawupdate', move);
  c.addEventListener('pointerup', end);
  c.addEventListener('pointercancel', end);
  c.addEventListener('pointerleave', end);
});
function setActive(name){
  document.querySelectorAll('.tool').forEach(b=>b.classList.remove('activeTool'));
  const el=document.querySelector('[data-tool="'+name+'"]');
  if(el)el.classList.add('activeTool');
}
function setPen(color,size,name){
  penColor=color;
  penSize=size;
  composite='source-over';
  mode='pen';
  setActive(name);
}
function setMarker(){
  penColor='rgba(250,204,21,.34)';
  penSize=18;
  composite='source-over';
  mode='pen';
  setActive('marker');
}
function setEraser(){
  penColor='rgba(0,0,0,1)';
  penSize=24;
  composite='destination-out';
  mode='pen';
  setActive('eraser');
}
function setLineMode(direction){
  composite='source-over';
  penSize=Math.max(3,penSize);
  mode=direction==='horizontal'?'lineH':'lineV';
  setActive(mode);
}
function clearBoard(){
  const r=board.getBoundingClientRect();
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,r.width,r.height);
}
function clearQuestionNotes(){
  const r=qCanvas.getBoundingClientRect();
  qCtx.globalCompositeOperation='source-over';
  qCtx.clearRect(0,0,r.width,r.height);
}
renderQuestion();
</script>
</body>
</html>
